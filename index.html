<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rizal's Footsteps — Photo Booth</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
:root {
  --ink:   #0f0d0a;
  --parch: #f2e8d5;
  --gold:  #b8973a;
  --gold2: #d4af50;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  min-height: 100vh;
  background: var(--ink);
  font-family: 'Crimson Pro', Georgia, serif;
  color: var(--parch);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(184,151,58,0.12) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(139,58,42,0.1) 0%, transparent 60%),
    linear-gradient(160deg, #1a1410 0%, #0f0d0a 50%, #141008 100%);
  pointer-events: none;
}
.wrap { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 0 16px 48px; }
.header { text-align: center; padding: 40px 20px 28px; }
.header-rule { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
.header-rule::before, .header-rule::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,151,58,0.5), transparent);
}
.header-diamond { width: 6px; height: 6px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }
.header-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.48rem, 1.2vw, 0.6rem);
  letter-spacing: 0.5em; color: var(--gold);
  margin-bottom: 10px; opacity: 0.8;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  font-weight: 700; color: var(--parch);
  letter-spacing: 0.06em; line-height: 1.1; margin-bottom: 10px;
}
.header-title span { color: var(--gold2); }
.header-sub {
  font-style: italic;
  font-size: clamp(1rem, 2.2vw, 1.2rem);
  color: rgba(242,232,213,0.5); font-weight: 300;
}
.section-label {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.5rem, 1.2vw, 0.58rem);
  letter-spacing: 0.4em; color: var(--gold); opacity: 0.7;
  display: block; text-align: center; margin-bottom: 16px;
}
.country-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 28px; }
.country-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,151,58,0.2);
  cursor: pointer; transition: all 0.2s ease;
  font-family: 'Crimson Pro', serif;
  min-width: 96px; border-radius: 3px; color: var(--parch);
}
.country-btn:hover { border-color: rgba(184,151,58,0.6); background: rgba(184,151,58,0.08); transform: translateY(-2px); }
.country-btn.active {
  border-color: var(--gold); background: rgba(184,151,58,0.14);
  box-shadow: 0 0 20px rgba(184,151,58,0.15), inset 0 0 20px rgba(184,151,58,0.05);
}
.country-flag { font-size: 1.6rem; }
.country-name { font-family: 'Cinzel', serif; font-size: clamp(0.55rem, 1.2vw, 0.65rem); font-weight: 600; letter-spacing: 0.08em; }
.country-landmark { font-size: clamp(0.62rem, 1.3vw, 0.72rem); font-style: italic; color: rgba(242,232,213,0.4); }
.preview-wrap {
  position: relative; width: 100%; aspect-ratio: 4/3;
  background: #080604; overflow: hidden; border-radius: 4px;
  border: 1px solid rgba(184,151,58,0.25);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 20px 60px rgba(0,0,0,0.6), inset 0 0 80px rgba(0,0,0,0.3);
  margin-bottom: 20px;
}
#inputVideo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; pointer-events: none; }
#outputCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
.status-bar {
  position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
  z-index: 10; background: rgba(10,8,4,0.85); color: rgba(242,232,213,0.8);
  font-style: italic; font-size: 0.85rem;
  padding: 6px 18px; border-radius: 20px;
  border: 1px solid rgba(184,151,58,0.2);
  white-space: nowrap; display: none; backdrop-filter: blur(8px);
}
.status-bar.show { display: block; }
.controls { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.btn {
  font-family: 'Cinzel', serif;
  font-size: clamp(0.55rem, 1.3vw, 0.65rem);
  letter-spacing: 0.2em; padding: 13px 28px;
  border: none; cursor: pointer; transition: all 0.25s ease; border-radius: 3px; white-space: nowrap;
}
.btn-start { background: linear-gradient(135deg, #1e1a14, #2a2318); color: var(--parch); border: 1px solid rgba(184,151,58,0.4); }
.btn-start:hover { border-color: var(--gold); box-shadow: 0 4px 20px rgba(184,151,58,0.2); transform: translateY(-1px); }
.btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-snap { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--ink); font-weight: 600; }
.btn-snap:hover { box-shadow: 0 4px 24px rgba(184,151,58,0.4); transform: translateY(-1px); }
.btn-snap:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
.btn-download { background: transparent; color: var(--gold); border: 1px solid rgba(184,151,58,0.35); display: none; }
.btn-download:hover { border-color: var(--gold); background: rgba(184,151,58,0.08); }
.btn-download.show { display: inline-block; }
.tip { text-align: center; font-style: italic; font-size: clamp(0.78rem, 1.6vw, 0.9rem); color: rgba(242,232,213,0.25); margin-top: 4px; }
#result-modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(5,4,2,0.92); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center; padding: 20px;
  opacity: 0; visibility: hidden; transition: opacity 0.35s ease, visibility 0.35s ease;
}
#result-modal.open { opacity: 1; visibility: visible; }
.result-box {
  background: linear-gradient(160deg, #1a1610, #111009);
  border: 1px solid rgba(184,151,58,0.3);
  max-width: 500px; width: 100%; padding: 28px 24px; text-align: center;
  transform: translateY(20px) scale(0.97);
  transition: transform 0.4s cubic-bezier(0.23,1,0.32,1);
  border-radius: 4px; box-shadow: 0 30px 80px rgba(0,0,0,0.7);
}
#result-modal.open .result-box { transform: translateY(0) scale(1); }
.result-title { font-family: 'Cinzel', serif; font-size: clamp(0.9rem, 2.5vw, 1.15rem); color: var(--gold2); letter-spacing: 0.1em; margin-bottom: 4px; }
.result-sub { font-style: italic; font-size: 0.95rem; color: rgba(242,232,213,0.45); margin-bottom: 6px; }
.result-badge { display: inline-block; margin-bottom: 16px; padding: 3px 12px; border: 1px solid rgba(184,151,58,0.3); font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.25em; color: var(--gold); }
#result-img { width: 100%; border-radius: 3px; border: 1px solid rgba(184,151,58,0.2); margin-bottom: 18px; display: block; }
.result-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.footer { text-align: center; padding: 32px 20px 20px; font-style: italic; font-size: 0.8rem; color: rgba(242,232,213,0.18); }
@media (max-width: 480px) { .country-btn { min-width: 80px; padding: 10px 10px; } .btn { padding: 12px 20px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-rule"><div class="header-diamond"></div></div>
    <div class="header-eyebrow">Interactive Heritage Experience</div>
    <div class="header-title">Rizal's <span>Footsteps</span></div>
    <div class="header-sub">Step into history and take a photo with José Rizal!</div>
  </div>

  <span class="section-label">Choose a destination</span>
  <div class="country-grid">
    <button class="country-btn" data-country="philippines" onclick="selectCountry(this)">
      <span class="country-flag">🇵🇭</span>
      <span class="country-name">Philippines</span>
      <span class="country-landmark">Rizal Park</span>
    </button>
    <button class="country-btn" data-country="spain" onclick="selectCountry(this)">
      <span class="country-flag">🇪🇸</span>
      <span class="country-name">Spain</span>
      <span class="country-landmark">Catedral de Burgos</span>
    </button>
    <button class="country-btn" data-country="france" onclick="selectCountry(this)">
      <span class="country-flag">🇫🇷</span>
      <span class="country-name">France</span>
      <span class="country-landmark">Eiffel Tower</span>
    </button>
    <button class="country-btn" data-country="germany" onclick="selectCountry(this)">
      <span class="country-flag">🇩🇪</span>
      <span class="country-name">Germany</span>
      <span class="country-landmark">Berlin Catedral</span>
    </button>
    <button class="country-btn" data-country="uk" onclick="selectCountry(this)">
      <span class="country-flag">🇬🇧</span>
      <span class="country-name">United Kingdom</span>
      <span class="country-landmark">London Bridge</span>
    </button>
    <button class="country-btn" data-country="belgium" onclick="selectCountry(this)">
      <span class="country-flag">🇧🇪</span>
      <span class="country-name">Belgium</span>
      <span class="country-landmark">Bruges</span>
    </button>
  </div>

  <div class="preview-wrap">
    <video id="inputVideo" playsinline autoplay muted></video>
    <canvas id="outputCanvas"></canvas>
    <div class="status-bar" id="status-bar">Loading…</div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btn-camera" onclick="startCamera()">📷 Start Camera</button>
    <button class="btn btn-snap"  id="btn-snap"   onclick="takePhoto()" disabled>✦ Take Photo</button>
    <button class="btn btn-download" id="btn-download" onclick="downloadPhoto()">↓ Download</button>
  </div>
  <div class="tip">Stand back so your full body is visible · Rizal will appear beside you</div>
</div>

<div id="result-modal" onclick="if(event.target===this)closeResult()">
  <div class="result-box">
    <div class="result-title">Your Photo with Rizal</div>
    <div class="result-sub" id="result-location-text"></div>
    <div class="result-badge" id="result-badge"></div>
    <img id="result-img" alt="Your photo with Rizal">
    <div class="result-actions">
      <button class="btn btn-snap" onclick="downloadPhoto()">↓ Download</button>
      <button class="btn btn-start" onclick="closeResult()">Take Another</button>
    </div>
  </div>
</div>

<div class="footer">Rizal's Footsteps · An Interactive Heritage Experience</div>

<script>
const COUNTRIES = {
  philippines: { name: 'Philippines',    landmark: 'Rizal Park',         flag: '🇵🇭', bg: 'images/philippines.jpg' },
  spain:       { name: 'Spain',          landmark: 'Catedral de Burgos', flag: '🇪🇸', bg: 'images/spain.png'       },
  france:      { name: 'France',         landmark: 'Eiffel Tower',       flag: '🇫🇷', bg: 'images/france.jpg'      },
  germany:     { name: 'Germany',        landmark: 'Berlin Catedral',    flag: '🇩🇪', bg: 'images/germany.png'     },
  uk:          { name: 'United Kingdom', landmark: 'London Bridge',      flag: '🇬🇧', bg: 'images/uk.png'          },
  belgium:     { name: 'Belgium',        landmark: 'Bruges',             flag: '🇧🇪', bg: 'images/belgium.png'     }
};

const bgCache  = {};
const rizalImg = new Image();
rizalImg.src   = 'images/rizal.png';

let selectedCountry = 'philippines';
let cameraStarted   = false;
let segmentation    = null;
let videoStream     = null;
let animFrame       = null;
let photoDataURL    = null;
let mpCamera        = null;
let currentBgImage  = null;

const video     = document.getElementById('inputVideo');
const canvas    = document.getElementById('outputCanvas');
const ctx       = canvas.getContext('2d');
const statusBar = document.getElementById('status-bar');

function loadBg(country) {
  return new Promise(resolve => {
    if (bgCache[country]) { resolve(bgCache[country]); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => { bgCache[country] = img; resolve(img); };
    img.onerror = () => resolve(null);
    img.src = COUNTRIES[country].bg;
  });
}

function selectCountry(btn) {
  document.querySelectorAll('.country-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedCountry = btn.dataset.country;
  loadBg(selectedCountry).then(img => {
    currentBgImage = img;
    if (!cameraStarted) redrawPreview();
  });
}

function redrawPreview() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  drawBg(canvas.width, canvas.height);
  drawRizal(canvas.width, canvas.height);
}

function previewLoop() {
  if (cameraStarted) return;
  redrawPreview();
  requestAnimationFrame(previewLoop);
}

canvas.width  = 640;
canvas.height = 480;
rizalImg.onload = () => { if (!cameraStarted) redrawPreview(); };
loadBg('philippines').then(img => { currentBgImage = img; previewLoop(); });
document.querySelector('.country-btn').classList.add('active');

const urlParams    = new URLSearchParams(window.location.search);
const countryParam = urlParams.get('country');
if (countryParam && COUNTRIES[countryParam]) {
  const targetBtn = document.querySelector(`[data-country="${countryParam}"]`);
  if (targetBtn) selectCountry(targetBtn);
}

async function startCamera() {
  const btn = document.getElementById('btn-camera');
  btn.disabled = true; btn.textContent = 'Starting…';
  showStatus('Requesting camera…');
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = videoStream;
    await video.play();
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    showStatus('Loading AI segmentation…');
    segmentation = new SelfieSegmentation({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${f}`
    });
    segmentation.setOptions({ modelSelection: 1, selfieMode: false });
    segmentation.onResults(onResults);
    mpCamera = new Camera(video, {
      onFrame: async () => { await segmentation.send({ image: video }); },
      width: canvas.width, height: canvas.height
    });
    await mpCamera.start();
    cameraStarted = true;
    btn.textContent = '⏹ Stop'; btn.disabled = false; btn.onclick = stopCamera;
    document.getElementById('btn-snap').disabled = false;
    hideStatus();
  } catch (err) {
    console.error(err);
    btn.disabled = false; btn.textContent = '📷 Start Camera'; btn.onclick = startCamera;
    hideStatus();
    if (err.name === 'NotAllowedError') alert('Camera access denied. Please allow camera access and try again.');
    else startFallback();
  }
}

function startFallback() {
  cameraStarted = true;
  const btn = document.getElementById('btn-camera');
  btn.textContent = '⏹ Stop'; btn.disabled = false; btn.onclick = stopCamera;
  document.getElementById('btn-snap').disabled = false;
  showStatus('Basic mode — no background removal'); setTimeout(hideStatus, 3000);
  fallbackLoop();
}

function fallbackLoop() {
  if (!cameraStarted) return;
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
  drawBg(W, H);
  ctx.save(); ctx.scale(-1,1); ctx.translate(-W,0); ctx.drawImage(video, 0, 0, W, H); ctx.restore();
  drawRizal(W, H);
  animFrame = requestAnimationFrame(fallbackLoop);
}

function onResults(results) {
  const W = canvas.width  = results.image.width;
  const H = canvas.height = results.image.height;

  // Raw unmirrored camera frame
  const rawC = document.createElement('canvas');
  rawC.width = W; rawC.height = H;
  const rCtx = rawC.getContext('2d');
  rCtx.drawImage(results.image, 0, 0, W, H);

  // Supersample the mask at 3x, blur heavily, scale back — best edge quality
  const SS = 3;
  const bigMask = document.createElement('canvas');
  bigMask.width = W * SS; bigMask.height = H * SS;
  const bCtx = bigMask.getContext('2d');
  bCtx.filter = `blur(${SS * 5}px)`;
  bCtx.drawImage(results.segmentationMask, 0, 0, W * SS, H * SS);
  bCtx.filter = 'none';

  const softMask = document.createElement('canvas');
  softMask.width = W; softMask.height = H;
  const sCtx = softMask.getContext('2d');
  sCtx.imageSmoothingEnabled = true;
  sCtx.imageSmoothingQuality = 'high';
  sCtx.drawImage(bigMask, 0, 0, W, H);

  // Apply mask to raw frame using destination-in
  rCtx.globalCompositeOperation = 'destination-in';
  rCtx.drawImage(softMask, 0, 0);
  rCtx.globalCompositeOperation = 'source-over';

  // Smoothstep on alpha for clean interior + natural feathered edges
  const px = rCtx.getImageData(0, 0, W, H);
  for (let i = 3; i < px.data.length; i += 4) {
    const a = px.data[i] / 255;
    px.data[i] = Math.round(a * a * (3 - 2 * a) * 255);
  }
  rCtx.putImageData(px, 0, 0);

  // Mirror the masked person
  const mirC = document.createElement('canvas');
  mirC.width = W; mirC.height = H;
  const mCtx = mirC.getContext('2d');
  mCtx.save(); mCtx.scale(-1,1); mCtx.translate(-W,0);
  mCtx.drawImage(rawC, 0, 0);
  mCtx.restore();

  // Final masked mirrored person
  const finC = document.createElement('canvas');
  finC.width = W; finC.height = H;
  const fCtx = finC.getContext('2d');
  fCtx.save(); fCtx.scale(-1,1); fCtx.translate(-W,0);
  fCtx.drawImage(rawC, 0, 0);
  fCtx.restore();

  ctx.clearRect(0, 0, W, H);
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
  drawBg(W, H);
  ctx.drawImage(finC, 0, 0);
  drawRizal(W, H);

  const vig = ctx.createRadialGradient(W/2, H/2, H*0.2, W/2, H/2, H*0.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = vig; ctx.fillRect(0, 0, W, H);
}

function drawBg(W, H) {
  if (currentBgImage && currentBgImage.naturalWidth > 0) {
    const iw = currentBgImage.naturalWidth, ih = currentBgImage.naturalHeight;
    const scale = Math.max(W / iw, H / ih);
    const sw = iw * scale, sh = ih * scale;
    ctx.drawImage(currentBgImage, (W - sw) / 2, (H - sh) / 2, sw, sh);
  } else {
    ctx.fillStyle = '#1a1410'; ctx.fillRect(0, 0, W, H);
  }
}

function drawRizal(W, H) {
  if (!rizalImg.complete || rizalImg.naturalWidth === 0) return;
  const rizalH = H * 0.65;
  const rizalW = rizalH * (rizalImg.naturalWidth / rizalImg.naturalHeight);
  ctx.drawImage(rizalImg, W * 0.18 - rizalW / 2, H - rizalH, rizalW, rizalH);
}

function takePhoto() {
  if (!cameraStarted) return;
  const flash = document.createElement('div');
  flash.style.cssText = 'position:fixed;inset:0;background:white;z-index:999;opacity:0;transition:opacity 0.08s;pointer-events:none';
  document.body.appendChild(flash);
  setTimeout(() => flash.style.opacity = '1', 10);
  setTimeout(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 250); }, 120);
  photoDataURL = canvas.toDataURL('image/jpeg', 0.95);
  const c = COUNTRIES[selectedCountry];
  document.getElementById('result-img').src = photoDataURL;
  document.getElementById('result-location-text').textContent = c.landmark;
  document.getElementById('result-badge').textContent = c.flag + '  ' + c.name.toUpperCase();
  document.getElementById('result-modal').classList.add('open');
  document.getElementById('btn-download').classList.add('show');
}

function downloadPhoto() {
  if (!photoDataURL) return;
  const a = document.createElement('a');
  a.href = photoDataURL;
  a.download = `rizals-footsteps-${selectedCountry}-${Date.now()}.jpg`;
  a.click();
}

function closeResult() { document.getElementById('result-modal').classList.remove('open'); }

function stopCamera() {
  if (mpCamera)    { mpCamera.stop(); mpCamera = null; }
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
  if (animFrame)   { cancelAnimationFrame(animFrame); animFrame = null; }
  segmentation = null; cameraStarted = false;
  ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
  const btn = document.getElementById('btn-camera');
  btn.textContent = '📷 Start Camera'; btn.onclick = startCamera; btn.disabled = false;
  document.getElementById('btn-snap').disabled = true;
  document.getElementById('btn-download').classList.remove('show');
  previewLoop();
}

function showStatus(m) { statusBar.textContent = m; statusBar.classList.add('show'); }
function hideStatus()  { statusBar.classList.remove('show'); }
</script>
</body>
</html>
